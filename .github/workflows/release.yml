name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Keep floating major/minor tags (e.g. v1, v1.2) pointing at the latest
  # release so consumers can pin to a moving major/minor line.
  floating-tags:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: ${{ github.event_name == 'push' && needs.goreleaser.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update floating major/minor tags
        env:
          FULL_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # FULL_TAG looks like v1.2.3 — derive v1 and v1.2.
          VER="${FULL_TAG#v}"
          MAJOR="v${VER%%.*}"
          MINOR="v${VER%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for t in "$MAJOR" "$MINOR"; do
            echo "Pointing $t at $FULL_TAG"
            git tag -f "$t" "$FULL_TAG"
            git push -f origin "refs/tags/$t"
          done

  notify:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: ${{ always() && needs.goreleaser.result == 'success' }}
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.RELEASES_WEBHOOK }}
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.tag || github.ref_name }}
        run: |
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "No Discord webhook configured; skipping notification."
            exit 0
          fi
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"New Release: $TAG_NAME\",
                \"description\": \"A new version of go-bash has been released!\",
                \"color\": 5814783,
                \"fields\": [
                  {
                    \"name\": \"Version\",
                    \"value\": \"$TAG_NAME\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Repository\",
                    \"value\": \"[go-bash](https://github.com/${{ github.repository }})\",
                    \"inline\": true
                  }
                ],
                \"footer\": {
                  \"text\": \"Released via GitHub Actions\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\",
                \"url\": \"$RELEASE_URL\"
              }]
            }" \
            $DISCORD_WEBHOOK
